name: Dependency Security Scan

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  trivy:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bill-splitter/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v1
        with:
          version: latest

      - name: Generate SBOM
        run: trivy fs requirements.txt --format cyclonedx --output sbom.json

      - name: Scan for vulnerabilities
        run: trivy fs requirements.txt --scanners vuln --exit-code 1 --severity HIGH,CRITICAL || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bill-splitter/backend/sbom.json
          retention-days: 30
